name: Update World Cup Calendar

on:
  schedule:
    # Check hourly during the tournament window for post-match opponent updates.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update calendar from FIFA
        run: python src/generate_calendar.py --auto

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update World Cup 2026 calendar from FIFA"
          file_pattern: "data/matches.json world_cup_2026.ics docs/world_cup_2026.ics"
